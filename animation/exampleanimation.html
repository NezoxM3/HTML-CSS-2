<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .box{
            width: 50px;
            height: 50px;
            background-color: red;


            position: relative;
            animation: move 2s ease-in-out infinite alternate;
        }

        @keyframes move{
            0%{
                left: 0;
            }

            100%{
                left: 200px;
            }
        }

    </style>

</head>
<body>
    <div class = "box"></div>
</body>
</html>
