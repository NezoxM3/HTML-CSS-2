<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width
    , initial-scale=1.0">
    <title>Document</title>

    <style>

        a{
            text-decoration: none;
            font-size: 2rem;
            background-color: chocolate;
            border-radius: 5px;
            color: white;
            padding: 15px 25px;

            /* Властивість яку змінюєм */
            transition-property: background-color;
            /* час переходу */
            transition-duration: 1s;

            /* часова функція */
            transition-timing-function: ease;

            /* затримка перед початком */
            transition-delay: 2s;

        }


        a:hover{
            padding: 25px 35px;
            background-color: rgb(42, 48, 165);
        }
</style>
</head>

<body>

</body>
</html>
